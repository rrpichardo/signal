[profile]
name = "Signal Stream AI/Tech"
organization = "Signal Stream"
audience = "AI/tech strategy reader"
mission = "Surface the highest-signal AI and technology industry developments, explain why they matter, and avoid repeating yesterday's news."
competitors = ["OpenAI", "Anthropic", "Google", "Meta", "Microsoft", "NVIDIA", "Apple", "Amazon", "xAI", "Mistral", "Perplexity"]
markets = ["AI", "generative AI", "LLM", "agents", "developer tools", "chips", "cloud", "enterprise software", "startups", "venture capital"]

[storage]
path = "../.signal_stream/signal_stream.db"

[delivery]
output_dir = "../outputs"
digest_limit = 40
critical_threshold = 86
similarity_threshold = 0.48

[brain]
model = "meta-llama/llama-4-scout-17b-16e-instruct"
timeout_seconds = 60

[agent]
max_iterations = 6
dashboard_port = 8765
worker_timeout_seconds = 2400
brain_file = "agent_brain.toml"
# Fallback modes only. The dashboard edits the real defaults in agent_brain.toml.
scout_mode = "hybrid"
analyst_mode = "hybrid"
require_brain = true
allow_mock_brain = false

[[priorities]]
name = "Frontier AI Product And Model Launches"
description = "Major model releases, capability jumps, frontier lab launches, and pricing/access changes."
weight = 2.8
keywords = ["Anthropic", "Claude", "Claude Code", "Claude Desktop", "Claude for Enterprise", "Artifacts", "Projects", "MCP", "model context protocol", "computer use", "tool use", "OpenAI", "ChatGPT", "GPT", "Gemini", "DeepMind", "Llama", "Meta AI", "Grok", "xAI", "Mistral", "frontier model", "model release", "new model", "reasoning model", "multimodal", "voice mode", "image generation", "video generation", "API", "SDK", "pricing", "enterprise plan", "developer platform", "feature launch", "product update"]

[[priorities]]
name = "Agents And Developer Workflows"
description = "Agent frameworks, tool use, developer platforms, IDE integrations, and dev workflows."
weight = 2.3
keywords = ["agents", "agentic", "AI agent", "coding agent", "Claude Code", "Codex", "Cursor", "Devin", "Replit", "Windsurf", "IDE", "CLI", "developer tools", "tool calling", "function calling", "browser use", "computer use", "workflow automation", "orchestration", "multi-agent", "evals", "evaluation", "observability", "prompt engineering", "RAG", "retrieval", "embeddings", "fine-tuning"]

[[priorities]]
name = "Enterprise AI Adoption And Monetization"
description = "Enterprise rollouts, fortune-500 customers, productivity case studies, vertical AI deployments."
weight = 1.8
keywords = ["enterprise", "customer", "deployment", "pilot", "procurement", "ROI", "productivity", "integration", "partnership", "Microsoft 365", "Google Workspace", "Salesforce", "ServiceNow", "Databricks", "Snowflake", "Oracle", "AWS", "Azure", "Google Cloud", "pricing", "subscription", "seats", "revenue", "ARR", "go-to-market", "compliance", "security review"]

[[priorities]]
name = "AI Infrastructure, Chips, And Inference"
description = "GPUs, accelerators, datacenters, inference cost, compute supply, training runs."
weight = 1.8
keywords = ["NVIDIA", "AMD", "Intel", "GPU", "TPU", "chip", "accelerator", "compute", "inference", "training", "data center", "cloud", "AWS", "Azure", "Google Cloud", "CoreWeave", "Lambda", "latency", "throughput", "HBM", "CUDA", "networking", "capacity", "power", "energy", "capex", "inference cost", "model serving"]

[[priorities]]
name = "AI Startups, Funding, And Category Creation"
description = "Seed/Series/IPO/M&A, new entrants, valuations, founder moves in AI."
weight = 1.6
keywords = ["startup", "funding", "seed", "Series A", "Series B", "Series C", "venture", "valuation", "YC", "acquisition", "acquires", "merger", "IPO", "spinout", "launch", "category", "market map", "open source startup", "AI app", "AI infrastructure startup", "AI tooling", "revenue", "ARR"]

[[priorities]]
name = "AI Regulation, Safety, Copyright, And Platform Risk"
description = "Policy, EU AI Act, safety research, alignment incidents, lawsuits, copyright."
weight = 1.7
keywords = ["regulation", "regulatory", "policy", "EU AI Act", "copyright", "lawsuit", "privacy", "security", "safety", "compliance", "antitrust", "export controls", "data protection", "model misuse", "deepfake", "watermarking", "governance", "liability", "content licensing", "training data", "fair use"]

[[priorities]]
name = "High-Signal Builder Tactics"
description = "Practical engineering essays, eval methodologies, RAG patterns, post-mortems."
weight = 1.2
keywords = ["architecture", "engineering", "case study", "postmortem", "benchmark", "eval", "evaluation", "RAG", "retrieval", "vector database", "embeddings", "fine-tuning", "prompt", "observability", "monitoring", "workflow", "automation", "latency", "cost optimization", "production AI"]

