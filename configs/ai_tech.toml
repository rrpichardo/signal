[profile]
name = "Signal Stream AI/Tech"
organization = "Signal Stream"
audience = "AI/tech strategy reader"
mission = "Surface the highest-signal AI and technology industry developments, explain why they matter, and avoid repeating yesterday's news."
competitors = ["OpenAI", "Anthropic", "Google", "Meta", "Microsoft", "NVIDIA", "Apple", "Amazon", "xAI", "Mistral", "Perplexity"]
markets = ["AI", "generative AI", "LLM", "agents", "developer tools", "chips", "cloud", "enterprise software", "startups", "venture capital"]

[storage]
path = "../.signal_stream/signal_stream.db"

[delivery]
output_dir = "../outputs"
digest_limit = 12
critical_threshold = 86
similarity_threshold = 0.48

[brain]
model = "meta-llama/llama-4-scout-17b-16e-instruct"
timeout_seconds = 60

[agent]
max_iterations = 6
min_signals = 8
dashboard_port = 8765
worker_timeout_seconds = 2400
max_article_age_days = 14
brain_file = "agent_brain.toml"
# Fallback modes only. The dashboard edits the real defaults in agent_brain.toml.
scout_mode = "hybrid"
analyst_mode = "hybrid"
require_brain = true
allow_mock_brain = false

[[priorities]]
name = "AI platform shifts"
description = "Major model, platform, pricing, developer ecosystem, or product moves."
weight = 2.2
keywords = ["OpenAI", "Anthropic", "Gemini", "Claude", "ChatGPT", "agents", "API", "model", "pricing", "platform", "developer", "enterprise"]

[[priorities]]
name = "Startup and investment signals"
description = "Funding, acquisitions, launches, and category creation in AI and tech."
weight = 1.6
keywords = ["funding", "startup", "acquisition", "acquires", "launch", "seed", "Series A", "venture", "valuation", "YC"]

[[priorities]]
name = "Infrastructure and chips"
description = "Compute, GPU, cloud, data center, and AI infrastructure constraints or breakthroughs."
weight = 1.7
keywords = ["NVIDIA", "GPU", "chip", "compute", "cloud", "infrastructure", "data center", "latency", "inference", "training"]

[[priorities]]
name = "Regulation and risk"
description = "Policy, safety, copyright, privacy, and enterprise adoption risks."
weight = 1.8
keywords = ["regulation", "policy", "copyright", "lawsuit", "privacy", "security", "safety", "EU AI Act", "compliance", "risk"]

[[priorities]]
name = "Builder tactics"
description = "Practical technical essays and operator lessons worth applying."
weight = 1.3
keywords = ["architecture", "engineering", "prompt", "evaluation", "RAG", "fine-tuning", "product", "growth", "PM", "case study"]

